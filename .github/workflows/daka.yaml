name: Daka

on:
  schedule:
    # GitHub Actions cron uses UTC.
    # 00:15 UTC = 08:15 Asia/Taipei.
    # Run early so GitHub Actions queue delays still usually finish before 10:00.
    - cron: '15 0 * * *'
    # 11:00 UTC = 19:00 Asia/Taipei.
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      punch_type:
        description: Punch type
        required: true
        default: S
        type: choice
        options:
          - S
          - E

jobs:
  daka:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./cli

    env:
      MODULE: ${{ secrets.MODULE}}
      USERNAME: ${{ secrets.USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}
      IMMEDIATE_DAKA: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Resolve punch type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "PUNCH_TYPE=${{ inputs.punch_type }}" >> "$GITHUB_ENV"
          elif [ "${{ github.event.schedule }}" = "15 0 * * *" ]; then
            echo "PUNCH_TYPE=S" >> "$GITHUB_ENV"
          elif [ "${{ github.event.schedule }}" = "0 11 * * *" ]; then
            echo "PUNCH_TYPE=E" >> "$GITHUB_ENV"
          else
            echo "Unsupported schedule: ${{ github.event.schedule }}" >&2
            exit 1
          fi

      - name: Daka
        run: node src/index.js "$PUNCH_TYPE" > result.md

      - name: Process Daka Result
        id: daka
        if: always()
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          result-encoding: string
          script: |
            const fs = require('fs').promises;

            let result;
            try {
              result = await fs.readFile('./cli/result.md', 'utf8');
            } catch (error) {
              result = [
                'Daka failed before producing result.md.',
                '',
                `event: ${context.eventName}`,
                `schedule: ${context.payload.schedule || 'manual'}`,
                `punch_type: ${process.env.PUNCH_TYPE || 'unknown'}`,
                `error: ${error.message}`
              ].join('\n');
            }

            // Determine result status
            let resultStatus = 'failed';
            if (result.includes('daka success')) {
              console.log('Daka Success');
              resultStatus = 'success';
            } else if (result.includes('no daka')) {
              console.log('No Daka');
              resultStatus = 'no need';
            } else {
              console.log('Daka Failed');
            }

            // Determine clock type
            let clockType = '';
            if (result.includes('gogo')) {
              clockType = 'gogo';
            } else if (result.includes('bye')) {
              clockType = 'bye';
            } else if (process.env.PUNCH_TYPE === 'S') {
              clockType = 'gogo';
            } else if (process.env.PUNCH_TYPE === 'E') {
              clockType = 'bye';
            }

            // Create the issue
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daka ${resultStatus} ${clockType}`,
              body: result
            });

            console.log(`Created issue #${issue.data.number}`);

            return issue.data.number;

      - name: Close issue
        if: steps.daka.outputs.result != ''
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.daka.outputs.result }},
              state: 'closed'
            })
