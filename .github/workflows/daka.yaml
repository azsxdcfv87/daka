name: Daka

on:
  schedule:
    # GitHub Actions cron uses UTC.
    # 00:30 UTC = 08:30 Asia/Taipei.
    - cron: '30 0 * * *'
    # 10:30 UTC = 18:30 Asia/Taipei.
    - cron: '30 10 * * *'

jobs:
  daka:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./cli

    env:
      MODULE: ${{ secrets.MODULE}}
      USERNAME: ${{ secrets.USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Daka gogo
        if: github.event.schedule == '30 0 * * *'
        env:
          DELAY_START_MINS: 30
          DELAY_END_MINS: 30
        run: node src/index.js S > result.md

      - name: Daka bye
        if: github.event.schedule == '30 10 * * *'
        env:
          DELAY_START_MINS: 0
          DELAY_END_MINS: 15
        run: node src/index.js E > result.md

      - name: Process Daka Result
        id: daka
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          result-encoding: string
          script: |
            const fs = require('fs').promises;

            // Read the result file using promise-based fs
            const result = await fs.readFile('./cli/result.md', 'utf8');

            // Determine result status
            let resultStatus = 'failed';
            if (result.includes('daka success')) {
              console.log('Daka Success');
              resultStatus = 'success';
            } else if (result.includes('no daka')) {
              console.log('No Daka');
              resultStatus = 'no need';
            } else {
              console.log('Daka Failed');
            }

            // Determine clock type
            let clockType = '';
            if (result.includes('gogo')) {
              clockType = 'gogo';
            } else if (result.includes('bye')) {
              clockType = 'bye';
            }

            // Create the issue
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daka ${resultStatus} ${clockType}`,
              body: result
            });

            console.log(`Created issue #${issue.data.number}`);

            return issue.data.number;

      - name: Close issue
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.daka.outputs.result }},
              state: 'closed'
            })
